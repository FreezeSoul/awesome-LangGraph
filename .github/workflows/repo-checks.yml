name: Repo Checks

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'README.md'
      - 'scripts/repo-checks.mjs'
      - '.github/workflows/repo-checks.yml'
      - 'package.json'

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run repo checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_AGE_MONTHS: '15'
          FAIL_ON_FINDINGS: 'true'
        run: npm run check:repo-checks
